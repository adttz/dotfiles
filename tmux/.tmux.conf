unbind r
bind r source-file ~/.tmux.conf \; display "Config Reloaded"

set-option -g prefix C-s
unbind C-a
bind C-s send-prefix

set-option -g status-keys vi

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Start all numbering at 1 instead of 0 for better key reachability
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

# Enable mouse support
set-option -g mouse on

# Increase history limit, as we want an "almost" unlimited buffer.
# May be set to something even higher, like 250k
set-option -g history-limit 100000

# Fix Terminal Title display, to not contain tmux specic information
set-option -g set-titles on
set-option -g set-titles-string "#{pane_title}"

# Open new windows and panes in the current working directory of the active
# pane.
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set-option -s focus-events on
set-option -s extended-keys on
set-option -s escape-time 0 

##
# Styling
set -a terminal-features "tmux-256color:RGB"
set -g allow-passthrough on
##

set-option -g status-position top
set-option -g status-style "bg=default"
set-option -g status-justify centre

set -g status-left "#{?client_prefix,  #S ,  #S }"
set -g status-left-length 30
# set-option -g status-left"#[fg=bold]#S"
set-option -g status-right ''

set-option -g window-status-format '#[fg=grey]#{window_index}#(echo ":")#{window_name}'
set-option -g window-status-current-format '#[bg=#6A89A7 fg=black bold] #{window_index}:#{window_name} '
set-option -g window-status-separator " "
# set -ga status-right " :#{b:pane_current_path} "

set -g default-shell /bin/zsh

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect key bindings (custom to avoid conflict with C-s prefix)
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Auto-save every 15 min and restore on start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

set -g @resurrect-processes '"claude->claude --continue"'

run '~/.tmux/plugins/tpm/tpm'
